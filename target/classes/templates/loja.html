<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CellStore</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1a1a24;
      --border: #2a2a38;
      --accent: #ff4d00;
      --accent2: #ff8c42;
      --text: #f0f0f5;
      --muted: #7a7a9a;
      --success: #00e676;
      --danger: #ff3d57;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero {
      position: relative;
      padding: 4rem 2rem 3rem;
      text-align: center;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -100px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,77,0,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      letter-spacing: 6px;
      line-height: 1;
      margin-bottom: 0.8rem;
    }

    .hero h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p { color: var(--muted); font-size: 1rem; font-weight: 300; }

    main { max-width: 1200px; margin: 0 auto; padding: 0 2rem 4rem; }

    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.65rem 1.3rem;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 20px rgba(255,77,0,0.3);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,77,0,0.45); }

    .btn-ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    .btn-danger {
      background: rgba(255,61,87,0.12);
      color: var(--danger);
      border: 1px solid rgba(255,61,87,0.2);
    }
    .btn-danger:hover { background: rgba(255,61,87,0.22); }

    .btn-edit {
      background: rgba(255,140,66,0.12);
      color: var(--accent2);
      border: 1px solid rgba(255,140,66,0.2);
    }
    .btn-edit:hover { background: rgba(255,140,66,0.22); }

    .btn-sm { padding: 0.4rem 0.85rem; font-size: 0.78rem; }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem 1.3rem;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.9rem;
      letter-spacing: 1px;
      color: var(--accent);
    }

    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 3px;
    }

    .section-title span { color: var(--accent); }

    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 3rem;
      position: relative;
      overflow: hidden;
    }

    .form-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.1rem;
      margin-bottom: 1.5rem;
    }

    .field { display: flex; flex-direction: column; gap: 0.4rem; }

    .field label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
    }

    .field input, .field textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 0.95rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      transition: border-color 0.2s;
      outline: none;
    }

    .field input:focus, .field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,77,0,0.1);
    }

    .field textarea { resize: vertical; min-height: 75px; }

    .form-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1.2rem;
    }

    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      position: relative;
    }

    .product-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,77,0,0.3);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }

    .card-badge {
      position: absolute;
      top: 1rem; right: 1rem;
      background: rgba(0,230,118,0.12);
      color: var(--success);
      border: 1px solid rgba(0,230,118,0.22);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.22rem 0.55rem;
      border-radius: 20px;
    }

    .card-badge.out {
      background: rgba(255,61,87,0.1);
      color: var(--danger);
      border-color: rgba(255,61,87,0.2);
    }

    .card-img {
      width: 100%;
      height: 150px;
      background: linear-gradient(135deg, var(--surface), var(--bg));
      display: flex; align-items: center; justify-content: center;
      font-size: 3.5rem;
      border-bottom: 1px solid var(--border);
    }

    .card-body { padding: 1.1rem; }

    .card-brand {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }

    .card-name { font-size: 1rem; font-weight: 600; margin-bottom: 0.2rem; }

    .card-modelo { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.7rem; }

    .card-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 0.9rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 0.9rem;
      border-top: 1px solid var(--border);
    }

    .card-price {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 1px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card-actions { display: flex; gap: 0.45rem; }

    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    .empty .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
    .empty h3 { font-size: 1rem; color: var(--text); margin-bottom: 0.4rem; }

    #formSection { display: none; }
    #formSection.open { display: block; }

    @media (max-width: 640px) {
      header { padding: 0 1rem; }
      main { padding: 0 1rem 3rem; }
      .hero { padding: 2.5rem 1rem 2rem; }
    }
	
	.snackbar {
	  position: fixed;
	  bottom: 2rem;
	  left: 50%;
	  transform: translateX(-50%) translateY(100px);
	  background: var(--card);
	  border: 1px solid var(--border);
	  border-radius: 12px;
	  padding: 0.85rem 1.5rem;
	  font-size: 0.9rem;
	  font-weight: 500;
	  display: flex;
	  align-items: center;
	  gap: 0.6rem;
	  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
	  z-index: 999;
	  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
	  white-space: nowrap;
	}

	.snackbar.show {
	  transform: translateX(-50%) translateY(0);
	}

	.snackbar.sucesso { border-color: var(--success); color: var(--success); }
	.snackbar.danger  { border-color: var(--danger);  color: var(--danger);  }
  </style>
</head>
<body>

<header>
  <div class="logo">CellStore</div>
  <button class="btn btn-primary" onclick="toggleForm()">＋ Novo Celular</button>
</header>

<section class="hero" id="hero">
  <h1>Os melhores<br/><span>smartphones</span></h1>
  <p>Gerencie seu catálogo com facilidade.</p>
</section>

<main>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-label">Total Produtos</div>
      <div class="stat-value" th:text="${totalProdutos}">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Em Estoque</div>
      <div class="stat-value" th:text="${emEstoque}">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Marcas</div>
      <div class="stat-value" th:text="${totalMarcas}">0</div>
    </div>
  </div>
  
  <div id="snackbar"
       class="snackbar"
       th:if="${mensagem != null}"
       th:classappend="${tipo}"
       th:data-show="true">
    <span th:text="${tipo == 'sucesso'} ? '✅' : '🗑️'"></span>
    <span th:text="${mensagem}"></span>
  </div>

  <!-- FORMULÁRIO -->
  <div id="formSection" th:classappend="${celular.id != null} ? 'open' : ''">
    <div class="form-card">

      <!-- CADASTRAR -->
      <div th:if="${celular.id == null}">
        <div class="section-header" style="margin-bottom:1.5rem">
          <h2 class="section-title">NOVO <span>CELULAR</span></h2>
        </div>
        <form th:action="@{/celulares}" th:object="${celular}" method="post">
          <div class="form-grid">
            <div class="field"><label>Nome</label><input type="text" id="nome" th:field="*{nome}" placeholder="ex: Galaxy S24"/></div>
            <div class="field"><label>Marca</label><input type="text" id="marca" th:field="*{marca}" placeholder="ex: Samsung"/></div>
            <div class="field"><label>Modelo</label><input type="text" id="modelo" th:field="*{modelo}" placeholder="ex: S24 Ultra"/></div>
            <div class="field"><label>Preço (R$)</label><input type="number" th:field="*{preco}" placeholder="0.00" step="0.01"/></div>
            <div class="field"><label>Estoque</label><input type="number" th:field="*{estoque}" placeholder="0" min="0"/></div>
            <div class="field" style="grid-column:1/-1"><label>Descrição</label><textarea th:field="*{descricao}" placeholder="Descrição do produto..."></textarea></div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-ghost" onclick="toggleForm()">Cancelar</button>
            <button type="submit" class="btn btn-primary">💾 Salvar</button>
          </div>
        </form>
      </div>

      <!-- EDITAR -->
      <div th:if="${celular.id != null}">
        <div class="section-header" style="margin-bottom:1.5rem">
          <h2 class="section-title">EDITAR <span>CELULAR</span></h2>
        </div>
        <form th:action="@{/celulares/atualizar}" th:object="${celular}" method="post">
          <input type="hidden" th:field="*{id}"/>
          <div class="form-grid">
            <div class="field"><label>Nome</label><input type="text" id="nome" th:field="*{nome}" placeholder="ex: Galaxy S24"/></div>
			<div class="field"><label>Marca</label><input type="text" id="marca" th:field="*{marca}" placeholder="ex: Samsung"/></div>
            <div class="field"><label>Modelo</label><input type="text" id="modelo" th:field="*{modelo}" placeholder="ex: S24 Ultra"/></div>
            <div class="field"><label>Preço (R$)</label><input type="number" th:field="*{preco}" placeholder="0.00" step="0.01"/></div>
            <div class="field"><label>Estoque</label><input type="number" th:field="*{estoque}" placeholder="0" min="0"/></div>
            <div class="field" style="grid-column:1/-1"><label>Descrição</label><textarea th:field="*{descricao}" placeholder="Descrição do produto..."></textarea></div>
          </div>
          <div class="form-actions">
            <a th:href="@{/celulares}" class="btn btn-ghost">Cancelar</a>
            <button type="submit" class="btn btn-primary">💾 Atualizar</button>
          </div>
        </form>
      </div>

    </div>
  </div>

  <!-- LISTA -->
  <div class="section-header">
    <h2 class="section-title">CATÁLOGO <span>/ PRODUTOS</span></h2>
  </div>

  <div class="products-grid">

    <div class="empty" th:if="${celulares.isEmpty()}">
      <div class="icon">📱</div>
      <h3>Nenhum celular cadastrado</h3>
      <p>Clique em "Novo Celular" para começar.</p>
    </div>

    <div class="product-card" th:each="c : ${celulares}">
      <span class="card-badge"
            th:classappend="${c.getEstoque() == 0} ? 'out' : ''"
            th:text="${c.getEstoque() > 0} ? ${c.getEstoque()} + ' un.' : 'Esgotado'">
      </span>
      <div class="card-img">📱</div>
      <div class="card-body">
        <div class="card-brand"  th:text="${c.getMarca()}"></div>
        <div class="card-name"   th:text="${c.getNome()}"></div>
        <div class="card-modelo" th:text="${c.getModelo()}"></div>
        <div class="card-desc"   th:text="${c.getDescricao()}" th:if="${c.getDescricao() != null}"></div>
        <div class="card-footer">
          <div class="card-price" th:text="'R$ ' + ${#numbers.formatDecimal(c.getPreco(), 1, 'POINT', 2, 'COMMA')}"></div>
          <div class="card-actions">
            <a th:href="@{/celulares/editar/{id}(id=${c.getId()})}" class="btn btn-edit btn-sm">✏️</a>
            <a th:href="@{/celulares/deletar/{id}(id=${c.getId()})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('Deseja excluir este celular?')">🗑️</a>
          </div>
        </div>
      </div>
    </div>

  </div>
</main>

<script>
  const f = document.getElementById('formSection');
  
  function toggleForm() {
    f.classList.toggle('open');
    if (f.classList.contains('open')) {
      f.scrollIntoView({ behavior: 'smooth' });
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('formSection');
    if (form.classList.contains('open')) {
      form.scrollIntoView({ behavior: 'smooth' });
    }
  });
  
  function showError(input, message) {
	let span = input.parentElement.querySelector('.error-msg');
	if(!span) {
		span = document.createElement('span');
		span.className = 'error-msg';
		span.style.cssText = 'color: red; font-size: 0.75em; margin-top: 0.2rem;';
		input.parentElement.appendChild(span);
	}
	span.textContent = message;
  }
  
  function clearError(input) {
	input.style.borderColor = '';
	const span = input.parentElement.querySelector('.error-msg');
	if (span) span.remove();
  }
  
  function validateForm(form) {
	let valid = true;
	
	const campos = 	[
      { id: 'nome',     label: 'Nome'    },
      { id: 'marca',    label: 'Marca'   },
      { id: 'modelo',   label: 'Modelo'  },
    ];
	
	campos.forEach(({id, label}) => {
		const input = form.querySelector(`[id$="${id}"]`);
		if (!input) return;
		
		if (input.value.trim() === '') {
			showError(input, `${label} é obrigatório`);
			valid = false;
		} else {
			clearError(input);			
		}
	});
	
	return valid;
  }
  
  const snackbar = document.getElementById('snackbar');
  if (snackbar && snackbar.dataset.show) {
    setTimeout(() => snackbar.classList.add('show'), 100);
    setTimeout(() => snackbar.classList.remove('show'), 3500);
  }
  
  document.querySelectorAll('form').forEach(form => {
	form.querySelectorAll('input, textArea').forEach(input => {
		input.addEventListener('input', () => clearError(input));
	});
	
	form.addEventListener('submit', (event) => {
		if (!validateForm(form)) {
			event.preventDefault();	
		}
	});
  });
</script>

</body>
</html>
